services:
  # ──────────────────────────────────────────────────────────────────────────────
  # BACKEND - API FastAPI (porta 9030)
  # Producao Dokploy: use docker-compose.dokploy.yml (nao este arquivo)
  # ──────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart_training_api
    ports:
      - "${API_PORT:-9030}:9030"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smart_training_net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # Traefik: porta interna 9030 (nome do service = "api" no compose)
      - "traefik.http.services.api.loadbalancer.server.port=9030"
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: smart_training_db
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_training}
      MYSQL_USER: ${MYSQL_USER:-smart_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smart_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smart_training_net
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  smart_training_net:
    driver: bridge
  dokploy-network:
    external: true
