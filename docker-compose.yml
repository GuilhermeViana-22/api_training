services:
  # ──────────────────────────────────────────────────────────────────────────────
  # BACKEND - API FastAPI
  # ──────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart_training_api
    ports:
      - "${API_PORT:-9030}:9030"
    env_file:
      - .env
    environment:
      # Sobrescreve o DATABASE_URL do .env (que aponta pro host local via porta
      # publicada 3310) — dentro da rede do compose o db é alcançado pelo nome
      # do serviço, na porta interna 3306.
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-smart_user}:${MYSQL_PASSWORD:-smart_pass}@db:3306/${MYSQL_DATABASE:-smart_training}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smart_training_net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────────
  # DATABASE - MySQL
  # ──────────────────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: smart_training_db
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_training}
      MYSQL_USER: ${MYSQL_USER:-smart_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smart_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smart_training_net
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  smart_training_net:
    driver: bridge
  dokploy-network:
    external: true
