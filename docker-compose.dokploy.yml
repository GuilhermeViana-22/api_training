# Dokploy — producao (MySQL externo, porta 9030)
# Variaveis: cadastre TODAS no painel Dokploy (Environment). Nao depende de arquivo .env no servidor.
#
# Painel Dokploy:
#   Compose file: docker-compose.dokploy.yml
#   Container Port: 9030
#   Network: dokploy-network
#   Se usar dominio NO PAINEL, desative router duplicado ou use so as labels abaixo.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "9030"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"

      - "traefik.http.routers.smart-training-api.rule=Host(`api.personal.guilhermeviana.com`)"
      - "traefik.http.routers.smart-training-api.entrypoints=websecure"
      - "traefik.http.routers.smart-training-api.tls=true"
      - "traefik.http.routers.smart-training-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.smart-training-api.service=smart-training-api"

      - "traefik.http.services.smart-training-api.loadbalancer.server.port=9030"

      - "traefik.http.routers.smart-training-api-http.rule=Host(`api.personal.guilhermeviana.com`)"
      - "traefik.http.routers.smart-training-api-http.entrypoints=web"
      - "traefik.http.routers.smart-training-api-http.middlewares=smart-training-api-https"
      - "traefik.http.middlewares.smart-training-api-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.smart-training-api-https.redirectscheme.permanent=true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9030/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  uploads_data:
    driver: local

networks:
  dokploy-network:
    external: true
